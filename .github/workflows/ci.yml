name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  bot-service:
    name: bot-service tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        working-directory: bot-service
        run: ./gradlew clean test

  worker-service:
    name: worker-service tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: worker-service/requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python dependencies
        working-directory: worker-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: worker-service
        run: pytest

  docker:
    name: docker compose
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: test-token
      TELEGRAM_BOT_USERNAME: Link2ActionBot
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate compose config
        run: docker compose config

      - name: Validate observability compose config
        run: docker compose -f docker-compose.yml -f docker-compose.observability.yml config

      - name: Build images
        run: docker compose build
