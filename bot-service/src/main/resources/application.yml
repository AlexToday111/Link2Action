spring:
  application:
    name: link2action-bot-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/link2action}
    username: ${SPRING_DATASOURCE_USERNAME:link2action}
    password: ${SPRING_DATASOURCE_PASSWORD:link2action}

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN}
    bot-username: ${TELEGRAM_BOT_USERNAME:Link2ActionBot}
    polling-delay-ms: ${TELEGRAM_POLLING_DELAY_MS:1000}

  rabbit:
    exchange: linkscribe.exchange
    request-queue: linkscribe.transcription.requests
    result-queue: linkscribe.transcription.results
    request-routing-key: transcription.requested
    completed-routing-key: transcription.completed
    failed-routing-key: transcription.failed
    progress-routing-key: ${RABBITMQ_PROGRESS_ROUTING_KEY:transcription.progress}

  storage:
    results-base-path: ${RESULTS_BASE_PATH:/data/results}

  transcription:
    max-active-tasks-per-user: ${MAX_ACTIVE_TASKS_PER_USER:1}

logging:
  level:
    root: INFO
    com.link2action.bot: DEBUG
