services:
  postgres:
    image: postgres:16-alpine
    container_name: link2action-postgres
    environment:
      POSTGRES_DB: link2action
      POSTGRES_USER: link2action
      POSTGRES_PASSWORD: link2action
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: link2action-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot-service:
    build:
      context: ./bot-service
    container_name: link2action-bot-service
    depends_on:
      postgres:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/link2action
      SPRING_DATASOURCE_USERNAME: link2action
      SPRING_DATASOURCE_PASSWORD: link2action
      
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      RABBITMQ_REQUEST_RETRY_QUEUE: linkscribe.transcription.requests.retry
      RABBITMQ_REQUEST_DLQ: linkscribe.transcription.requests.dlq
      RABBITMQ_RETRY_ROUTING_KEY: transcription.requested.retry
      RABBITMQ_DLQ_ROUTING_KEY: transcription.requested.dlq
      RABBITMQ_RETRY_DELAY_MS: 30000
      RABBITMQ_PROGRESS_ROUTING_KEY: transcription.progress
      
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-Link2ActionBot}
      TELEGRAM_MAX_UPLOAD_FILE_SIZE_BYTES: ${TELEGRAM_MAX_UPLOAD_FILE_SIZE_BYTES:-20971520}
      
      RESULTS_BASE_PATH: /data/results
      MAX_ACTIVE_TASKS_PER_USER: 1
      MAX_BATCH_SIZE: ${MAX_BATCH_SIZE:-5}
      LLM_LAUNCHER_ENABLED: ${LLM_LAUNCHER_ENABLED:-true}
      LLM_CHATGPT_URL: ${LLM_CHATGPT_URL:-https://chatgpt.com/}
      LLM_CLAUDE_URL: ${LLM_CLAUDE_URL:-https://claude.ai/}
      LLM_GEMINI_URL: ${LLM_GEMINI_URL:-https://gemini.google.com/}
      LLM_PERPLEXITY_URL: ${LLM_PERPLEXITY_URL:-https://www.perplexity.ai/}
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep UP"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker-service:
    build:
      context: ./worker-service
    container_name: link2action-worker-service
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest

      RABBITMQ_EXCHANGE: linkscribe.exchange
      RABBITMQ_REQUEST_QUEUE: linkscribe.transcription.requests
      RABBITMQ_RESULT_QUEUE: linkscribe.transcription.results
      RABBITMQ_REQUEST_ROUTING_KEY: transcription.requested
      RABBITMQ_RETRY_ROUTING_KEY: transcription.requested.retry
      RABBITMQ_DLQ_ROUTING_KEY: transcription.requested.dlq
      RABBITMQ_COMPLETED_ROUTING_KEY: transcription.completed
      RABBITMQ_FAILED_ROUTING_KEY: transcription.failed
      RABBITMQ_PROGRESS_ROUTING_KEY: transcription.progress
      RABBITMQ_REQUEST_RETRY_QUEUE: linkscribe.transcription.requests.retry
      RABBITMQ_REQUEST_DLQ: linkscribe.transcription.requests.dlq
      RABBITMQ_RETRY_DELAY_MS: 30000
      RABBITMQ_MAX_RETRY_ATTEMPTS: 3
      RABBITMQ_HEARTBEAT: 0
      RABBITMQ_BLOCKED_CONNECTION_TIMEOUT: 300
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
      TELEGRAM_FILE_DOWNLOAD_BASE_URL: ${TELEGRAM_FILE_DOWNLOAD_BASE_URL:-https://api.telegram.org/file}
      TELEGRAM_FILE_DOWNLOAD_TIMEOUT_SECONDS: ${TELEGRAM_FILE_DOWNLOAD_TIMEOUT_SECONDS:-60}

      RESULTS_BASE_PATH: /data/results
      DOWNLOADS_BASE_PATH: /data/downloads
      YT_DLP_COOKIES_FILE: ${YT_DLP_COOKIES_FILE:-}

      WHISPER_MODEL: small
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      WHISPER_LANGUAGE: ""

      MAX_VIDEO_DURATION_SECONDS: 3600
      RABBITMQ_PREFETCH_COUNT: 1
      RABBITMQ_CONNECTION_ATTEMPTS: 30
      RABBITMQ_CONNECTION_RETRY_SECONDS: 2
      WORKER_METRICS_ENABLED: "true"
      WORKER_METRICS_PORT: 9091
    ports:
      - "9091:9091"
    volumes:
      - ./data:/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9091/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-data:
